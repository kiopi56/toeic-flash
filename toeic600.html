<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TOEIC 600 Flash — 必須英文50本</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TOEIC Flash">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1c1c1c;
    --border: #2a2a2a;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.12);
    --text: #e8e4dc;
    --muted: #6b6660;
    --green: #4caf7a;
    --red: #e05a5a;
    --tag: #252525;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    padding: 40px 40px 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .logo span { font-style: italic; font-weight: 400; }

  .subtitle {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat {
    text-align: center;
  }

  .stat-n {
    font-family: 'DM Mono', monospace;
    font-size: 1.5rem;
    color: var(--accent);
    line-height: 1;
  }

  .stat-l {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  /* ── FILTERS ── */
  .filter-bar {
    padding: 20px 40px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .filter-label {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .tag-btn {
    padding: 5px 14px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: var(--tag);
    color: var(--muted);
    font-size: 0.72rem;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .tag-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tag-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .search-wrap {
    margin-left: auto;
    position: relative;
  }

  .search-wrap input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.78rem;
    padding: 6px 14px 6px 32px;
    border-radius: 2px;
    width: 200px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.8rem;
    pointer-events: none;
  }

  /* ── MODE TOGGLE ── */
  .mode-bar {
    padding: 14px 40px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }

  .mode-btn {
    padding: 4px 16px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .mode-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 500;
  }

  .progress-wrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-bar-outer {
    width: 140px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-inner {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
  }

  /* ── LIST MODE ── */
  .list-container {
    padding: 30px 40px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 20px 22px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .card:hover { border-color: #3a3a3a; transform: translateY(-1px); }
  .card:hover::before { opacity: 1; }
  .card.mastered { border-color: rgba(76,175,122,0.3); }
  .card.mastered::before { background: var(--green); opacity: 1; }

  .card-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    margin-bottom: 10px;
    letter-spacing: 0.1em;
  }

  .card-en {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 10px;
    font-weight: 700;
  }

  .card-ja {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.7;
    transition: opacity 0.2s;
  }

  .card-ja.hidden { opacity: 0; filter: blur(4px); cursor: pointer; }
  .card-ja.hidden:hover { opacity: 0.3; }

  .card-tags {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.6rem;
    padding: 2px 8px;
    border-radius: 2px;
    background: var(--tag);
    color: var(--muted);
    border: 1px solid var(--border);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .master-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.7rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .master-btn:hover { border-color: var(--green); color: var(--green); }
  .card.mastered .master-btn { background: var(--green); border-color: var(--green); color: #000; }

  /* ── FLASH MODE ── */
  #flash-mode {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 140px);
    padding: 40px;
  }

  .flash-counter {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    margin-bottom: 32px;
  }

  .flash-card {
    width: 100%;
    max-width: 640px;
    min-height: 280px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 48px;
    cursor: pointer;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: transform 0.08s;
  }

  .flash-card:active { transform: scale(0.99); }

  .flash-tag-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .flash-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    margin-bottom: 20px;
    letter-spacing: 0.1em;
  }

  .flash-en {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    line-height: 1.55;
    color: var(--text);
    font-weight: 700;
    margin-bottom: 28px;
  }

  .flash-divider {
    width: 40px;
    height: 1px;
    background: var(--accent);
    margin-bottom: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .flash-divider.shown { opacity: 1; }

  .flash-ja {
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.8;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .flash-ja.shown { opacity: 1; }

  .flash-hint {
    margin-top: 20px;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    opacity: 0.5;
  }

  .flash-actions {
    display: flex;
    gap: 14px;
    margin-top: 24px;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .flash-actions.shown { opacity: 1; }

  .flash-btn {
    padding: 10px 32px;
    border-radius: 2px;
    border: 1px solid;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .flash-btn.wrong {
    border-color: var(--red);
    color: var(--red);
    background: transparent;
  }

  .flash-btn.wrong:hover {
    background: rgba(224,90,90,0.1);
  }

  .flash-btn.ok {
    border-color: var(--green);
    color: var(--green);
    background: transparent;
  }

  .flash-btn.ok:hover {
    background: rgba(76,175,122,0.1);
  }

  .flash-nav {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: center;
  }

  .nav-btn {
    padding: 7px 20px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.72rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }

  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* ── EMPTY ── */
  .empty {
    text-align: center;
    padding: 80px 40px;
    color: var(--muted);
    font-size: 0.85rem;
    display: none;
  }

  /* ── SPEECH ── */
  .speak-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 2px;
    padding: 3px 10px;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .speak-btn:hover { border-color: var(--accent); color: var(--accent); }
  .speak-btn.speaking { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .flash-speak-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 2px;
    padding: 7px 20px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans JP', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .flash-speak-btn:hover { border-color: var(--accent); color: var(--accent); }
  .flash-speak-btn.speaking { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: 16px;
    padding-left: 16px;
    border-left: 1px solid var(--border);
  }
  .speed-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .speed-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 80px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .speed-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    min-width: 28px;
  }

  /* ── RESPONSIVE / MOBILE ── */
  @media (max-width: 600px) {
    header { padding: 20px 16px 16px; gap: 10px; }
    .logo { font-size: 1.4rem; }
    .subtitle { font-size: 0.62rem; }
    .stat-n { font-size: 1.2rem; }
    .stats-bar { gap: 16px; }

    .filter-bar { padding: 12px 16px; gap: 6px; }
    .tag-btn { padding: 6px 10px; font-size: 0.7rem; }
    .search-wrap { margin-left: 0; width: 100%; }
    .search-wrap input { width: 100%; }

    #voice-indicator { padding: 6px 16px; font-size: 0.62rem; gap: 10px; }

    .mode-bar { padding: 10px 16px; flex-wrap: wrap; gap: 6px; }
    .mode-btn { padding: 8px 14px; font-size: 0.75rem; flex: 1; text-align: center; }
    .speed-control { margin-left: 0; padding-left: 0; border-left: none; width: 100%; }
    .progress-wrap { margin-left: 0; width: 100%; justify-content: flex-end; }
    .progress-bar-outer { flex: 1; }

    .list-container { padding: 12px 16px 100px; grid-template-columns: 1fr; gap: 10px; }
    .card { padding: 16px 16px; }
    .card-en { font-size: 0.95rem; }
    .card-ja { font-size: 0.8rem; }

    /* フラッシュカードモード：スマホで画面いっぱいに */
    #flash-mode {
      min-height: calc(100svh - 200px);
      padding: 16px;
      justify-content: space-between;
    }
    .flash-card {
      padding: 28px 20px;
      min-height: 0;
      flex: 1;
      margin: 0 0 12px;
    }
    .flash-en { font-size: 1.1rem; }
    .flash-ja { font-size: 0.85rem; }
    .flash-actions {
      flex-wrap: wrap;
      gap: 8px;
    }
    .flash-btn, .flash-speak-btn {
      padding: 12px 0;
      flex: 1;
      min-width: 80px;
      text-align: center;
      font-size: 0.8rem;
      justify-content: center;
    }
    .flash-nav {
      gap: 6px;
    }
    .nav-btn {
      flex: 1;
      padding: 12px 8px;
      font-size: 0.75rem;
      text-align: center;
    }

    /* iOS safe area対応 */
    body { padding-bottom: env(safe-area-inset-bottom); }
  }

  /* タッチデバイス全般：タップ領域を大きく */
  @media (hover: none) {
    .tag-btn { min-height: 36px; }
    .master-btn { width: 32px; height: 32px; font-size: 0.9rem; }
    .speak-btn { padding: 6px 14px; min-height: 32px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">TOEIC<span>600</span> Flash</div>
    <div class="subtitle">必須英文 50本 — ビジネス英語コア表現</div>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-n" id="total-n">50</div>
      <div class="stat-l">Total</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="mastered-n" style="color: var(--green)">0</div>
      <div class="stat-l">Mastered</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="remain-n">50</div>
      <div class="stat-l">Remaining</div>
    </div>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">Category</span>
  <button class="tag-btn active" data-cat="all">すべて</button>
  <button class="tag-btn" data-cat="business">ビジネス</button>
  <button class="tag-btn" data-cat="meeting">会議・交渉</button>
  <button class="tag-btn" data-cat="email">メール・書類</button>
  <button class="tag-btn" data-cat="travel">出張・移動</button>
  <button class="tag-btn" data-cat="daily">日常会話</button>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="英文・日本語で検索…">
  </div>
</div>

<!-- 音声インジケーター -->
<div id="voice-indicator" style="
  padding: 8px 40px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.06em;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
">
  <span>🎙 日本語音声: <span id="voice-ja-name" style="color:var(--accent)">検出中…</span></span>
  <span>🎙 英語音声: <span id="voice-en-name" style="color:var(--accent)">検出中…</span></span>
</div>

<div class="mode-bar">
  <button class="mode-btn active" id="btn-list">一覧モード</button>
  <button class="mode-btn" id="btn-flash">フラッシュカードモード</button>
  <div class="speed-control">
    <span class="speed-label">速度</span>
    <input type="range" class="speed-slider" id="speed-slider" min="0.5" max="1.5" step="0.1" value="0.9">
    <span class="speed-val" id="speed-val">0.9×</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
    </div>
    <span class="progress-text" id="progress-text">0 / 50</span>
  </div>
</div>

<div id="list-mode">
  <div class="list-container" id="card-list"></div>
  <div class="empty" id="empty-msg">該当する英文がありません</div>
</div>

<div id="flash-mode">
  <div class="flash-counter" id="flash-counter">1 / 50</div>
  <div class="flash-card" id="flash-card">
    <div class="flash-num" id="flash-num">#01</div>
    <div class="flash-tag-row" id="flash-tags"></div>
    <div class="flash-en" id="flash-en"></div>
    <div class="flash-divider" id="flash-divider"></div>
    <div class="flash-ja" id="flash-ja"></div>
    <div class="flash-hint" id="flash-hint">タップして和訳を見る</div>
    <div class="flash-actions" id="flash-actions">
      <button class="flash-btn wrong" id="btn-wrong">✗ もう一度</button>
      <button class="flash-speak-btn" id="btn-flash-speak">🔊 読み上げ</button>
      <button class="flash-btn ok" id="btn-ok">✓ 覚えた</button>
    </div>
  </div>
  <div class="flash-nav">
    <button class="nav-btn" id="btn-prev">← 前へ</button>
    <button class="nav-btn" id="btn-speak-auto" title="カード表示時に自動読み上げ">🔊 自動再生: OFF</button>
    <button class="nav-btn" id="btn-next">次へ →</button>
  </div>
</div>

<script>
const sentences = [
  // ── BUSINESS ──
  { id:1, en:"Please let me know if you have any questions or concerns.", ja:"ご質問やご不明な点がございましたら、お気軽にお知らせください。", cats:["business","email"] },
  { id:2, en:"I would like to confirm our appointment for Monday at 10 a.m.", ja:"月曜日の午前10時のお約束を確認したいと思います。", cats:["business","email"] },
  { id:3, en:"We are pleased to inform you that your application has been accepted.", ja:"ご応募を受理いたしましたことをお知らせいたします。", cats:["business","email"] },
  { id:4, en:"Could you please send me the revised proposal by the end of this week?", ja:"今週中に修正した提案書を送っていただけますか？", cats:["business","email"] },
  { id:5, en:"I am writing to follow up on our previous conversation.", ja:"先日のお話の件でご連絡しております。", cats:["business","email"] },
  { id:6, en:"Thank you for your prompt response.", ja:"迅速にご返信いただきありがとうございます。", cats:["business","email"] },
  { id:7, en:"We regret to inform you that the event has been postponed.", ja:"誠に残念ながら、イベントが延期となりましたことをお知らせいたします。", cats:["business","email"] },

// ── STATE ──
let mastered = new Set(JSON.parse(localStorage.getItem('toeic_mastered') || '[]'));
let showJa = new Set();
let currentCat = 'all';
let searchQ = '';
let flashIdx = 0;
let flashRevealed = false;
let flashList = [...sentences];
let autoSpeak = false;
let speechRate = 0.9;

// ── SPEECH ──

// 利用可能な音声一覧をキャッシュ
let _voices = [];
function loadVoices() {
  _voices = window.speechSynthesis.getVoices();
}

// 最適な日本語音声を選ぶ（優先順位付き）
function getBestJaVoice() {
  // 優先度1: Google 日本語（Chrome desktop）
  const google = _voices.find(v => v.name.includes('Google') && v.lang.startsWith('ja'));
  if (google) return google;
  // 優先度2: ローカル音声（OS内蔵）
  const local = _voices.find(v => v.lang.startsWith('ja') && v.localService);
  if (local) return local;
  // 優先度3: 何でもいいので日本語
  return _voices.find(v => v.lang.startsWith('ja')) || null;
}

// 最適な英語音声を選ぶ
function getBestEnVoice() {
  const google = _voices.find(v => v.name.includes('Google') && v.lang === 'en-US');
  if (google) return google;
  const local = _voices.find(v => v.lang === 'en-US' && v.localService);
  if (local) return local;
  return _voices.find(v => v.lang.startsWith('en')) || null;
}

// 1発話をPromiseでラップ
function utterPromise(text, lang, rate, pitch, voice) {
  return new Promise(resolve => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = rate;
    u.pitch = pitch;
    if (voice) u.voice = voice;
    u.onend = resolve;
    u.onerror = resolve;
    window.speechSynthesis.speak(u);
  });
}

// 日本語 → 間隔 → 英語
async function speakJaThenEn(jaText, enText, btn) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  if (btn) btn.classList.add('speaking');

  try {
    const jaVoice = getBestJaVoice();
    const enVoice = getBestEnVoice();

    // 日本語：速度はスライダーと同じ、ピッチ少し高め
    await utterPromise(jaText, 'ja-JP', speechRate, 1.05, jaVoice);

    // 間隔（無音utteranceで0.5秒程度）
    await utterPromise('　', 'ja-JP', 0.1, 1.0, jaVoice);

    // 英語
    await utterPromise(enText, 'en-US', speechRate, 1.0, enVoice);
  } finally {
    if (btn) btn.classList.remove('speaking');
  }
}

// 英語のみ（一覧モードの「聴く」ボタン）
async function speakEn(enText, btn) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  if (btn) btn.classList.add('speaking');
  try {
    await utterPromise(enText, 'en-US', speechRate, 1.0, getBestEnVoice());
  } finally {
    if (btn) btn.classList.remove('speaking');
  }
}

// ── SAVE ──
function saveMastered() {
  localStorage.setItem('toeic_mastered', JSON.stringify([...mastered]));
}

// ── FILTER ──
function filtered() {
  return sentences.filter(s => {
    const catOk = currentCat === 'all' || s.cats.includes(currentCat);
    const q = searchQ.toLowerCase();
    const qOk = !q || s.en.toLowerCase().includes(q) || s.ja.includes(q);
    return catOk && qOk;
  });
}

// ── STATS ──
function updateStats() {
  const m = mastered.size;
  document.getElementById('mastered-n').textContent = m;
  document.getElementById('remain-n').textContent = 50 - m;
  document.getElementById('progress-bar').style.width = (m / 50 * 100) + '%';
  document.getElementById('progress-text').textContent = m + ' / 50';
}

// ── LIST RENDER ──
function renderList() {
  const list = filtered();
  const container = document.getElementById('card-list');
  const empty = document.getElementById('empty-msg');
  container.innerHTML = '';
  if (list.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (mastered.has(s.id) ? ' mastered' : '');
    card.style.animationDelay = (i * 0.02) + 's';
    const jaHidden = !showJa.has(s.id);
    card.innerHTML = `
      <button class="master-btn" title="覚えた" data-id="${s.id}">✓</button>
      <div class="card-num">#${String(s.id).padStart(2,'0')}</div>
      <div class="card-en">${s.en}</div>
      <div class="card-ja${jaHidden ? ' hidden' : ''}" data-id="${s.id}">${s.ja}</div>
      <div class="card-tags">
        ${s.cats.map(c => `<span class="tag">${c}</span>`).join('')}
        <button class="speak-btn" data-en="${s.en.replace(/"/g,'&quot;')}">🔊 聴く</button>
      </div>
    `;
    // speak btn
    card.querySelector('.speak-btn').addEventListener('click', e => {
      e.stopPropagation();
      speakEn(e.currentTarget.dataset.en, e.currentTarget);
    });
    // toggle ja
    card.querySelector('.card-ja').addEventListener('click', e => {
      const id = parseInt(e.currentTarget.dataset.id);
      if (showJa.has(id)) showJa.delete(id); else showJa.add(id);
      e.currentTarget.classList.toggle('hidden');
    });
    // master btn
    card.querySelector('.master-btn').addEventListener('click', e => {
      e.stopPropagation();
      const id = parseInt(e.currentTarget.dataset.id);
      if (mastered.has(id)) mastered.delete(id); else mastered.add(id);
      saveMastered();
      updateStats();
      renderList();
    });
    container.appendChild(card);
  });
}

// ── FLASH RENDER ──
function renderFlash() {
  flashList = filtered();
  if (flashList.length === 0) return;
  if (flashIdx >= flashList.length) flashIdx = flashList.length - 1;
  const s = flashList[flashIdx];
  flashRevealed = false;
  document.getElementById('flash-counter').textContent = (flashIdx+1) + ' / ' + flashList.length;
  document.getElementById('flash-num').textContent = '#' + String(s.id).padStart(2,'0');
  document.getElementById('flash-en').textContent = s.en;
  document.getElementById('flash-ja').textContent = s.ja;
  document.getElementById('flash-tags').innerHTML = s.cats.map(c => `<span class="tag">${c}</span>`).join('');
  document.getElementById('flash-divider').classList.remove('shown');
  document.getElementById('flash-ja').classList.remove('shown');
  document.getElementById('flash-actions').classList.remove('shown');
  document.getElementById('flash-hint').style.display = 'block';
  document.getElementById('btn-prev').disabled = flashIdx === 0;
  document.getElementById('btn-next').disabled = flashIdx === flashList.length - 1;

  // auto speak：日本語→英語
  if (autoSpeak) {
    window.speechSynthesis.cancel();
    setTimeout(() => speakJaThenEn(s.ja, s.en), 300);
  }
}

function revealFlash() {
  if (flashRevealed) return;
  flashRevealed = true;
  document.getElementById('flash-divider').classList.add('shown');
  document.getElementById('flash-ja').classList.add('shown');
  document.getElementById('flash-actions').classList.add('shown');
  document.getElementById('flash-hint').style.display = 'none';
}

// ── EVENTS ──
document.getElementById('flash-card').addEventListener('click', revealFlash);

// flash speak button（日本語→英語）
document.getElementById('btn-flash-speak').addEventListener('click', e => {
  e.stopPropagation();
  const s = flashList[flashIdx];
  if (s) speakJaThenEn(s.ja, s.en, e.currentTarget);
});

// auto speak toggle
document.getElementById('btn-speak-auto').addEventListener('click', e => {
  autoSpeak = !autoSpeak;
  e.currentTarget.textContent = `🔊 自動再生: ${autoSpeak ? 'ON' : 'OFF'}`;
  e.currentTarget.style.borderColor = autoSpeak ? 'var(--accent)' : '';
  e.currentTarget.style.color = autoSpeak ? 'var(--accent)' : '';
});

// speed slider
document.getElementById('speed-slider').addEventListener('input', e => {
  speechRate = parseFloat(e.target.value);
  document.getElementById('speed-val').textContent = speechRate.toFixed(1) + '×';
});

document.getElementById('btn-ok').addEventListener('click', () => {
  const s = flashList[flashIdx];
  mastered.add(s.id);
  saveMastered();
  updateStats();
  if (flashIdx < flashList.length - 1) { flashIdx++; renderFlash(); }
});

document.getElementById('btn-wrong').addEventListener('click', () => {
  const s = flashList[flashIdx];
  mastered.delete(s.id);
  saveMastered();
  updateStats();
  if (flashIdx < flashList.length - 1) { flashIdx++; renderFlash(); }
});

document.getElementById('btn-prev').addEventListener('click', () => {
  if (flashIdx > 0) { flashIdx--; renderFlash(); }
});

document.getElementById('btn-next').addEventListener('click', () => {
  if (flashIdx < flashList.length - 1) { flashIdx++; renderFlash(); }
});

// mode toggle
document.getElementById('btn-list').addEventListener('click', () => {
  document.getElementById('btn-list').classList.add('active');
  document.getElementById('btn-flash').classList.remove('active');
  document.getElementById('list-mode').style.display = 'block';
  document.getElementById('flash-mode').style.display = 'none';
  renderList();
});

document.getElementById('btn-flash').addEventListener('click', () => {
  document.getElementById('btn-flash').classList.add('active');
  document.getElementById('btn-list').classList.remove('active');
  document.getElementById('list-mode').style.display = 'none';
  document.getElementById('flash-mode').style.display = 'flex';
  flashIdx = 0;
  renderFlash();
});

// category filter
document.querySelectorAll('.tag-btn[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tag-btn[data-cat]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    flashIdx = 0;
    renderList();
    renderFlash();
  });
});

// search
document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value;
  flashIdx = 0;
  renderList();
  renderFlash();
});

// ── INIT ──
// Service Worker登録（PWA）
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e));
}

function initVoices() {
  loadVoices();
  const ja = getBestJaVoice();
  const en = getBestEnVoice();
  document.getElementById('voice-ja-name').textContent = ja ? ja.name : '見つかりませんでした';
  document.getElementById('voice-en-name').textContent = en ? en.name : '見つかりませんでした';
}

if (window.speechSynthesis) {
  // Chromeは非同期でロードされるので両方対応
  window.speechSynthesis.onvoiceschanged = initVoices;
  initVoices();
}

updateStats();
renderList();
</script>
